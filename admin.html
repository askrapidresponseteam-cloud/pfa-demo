<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Console - People for Animals</title>
<link rel="icon" href="media/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="media/pfa-icon-32.png">
<link rel="apple-touch-icon" href="media/pfa-icon-180.png">
<meta name="theme-color" content="#0E1116">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Marcellus&display=swap" rel="stylesheet">
<style>
  :root{
    --font-d:'Archivo',system-ui,sans-serif;
    --font-s:'Marcellus',Georgia,serif;
    --white:#FFFFFF;
    --porcelain:#F4F6F7;
    --ink:#0E1116;
    --ink-2:#171C23;
    --ink-3:#1F2630;
    --blue:#00A4FF;
    --blue-ink:#006DB3;
    --blue-mid:#0090E0;
    --hair:#D9DEE3;
    --hair-soft:#E8ECEF;
    --mut:#5A646E;
    --mut-2:#8F98A1;
    --ok:#1B8A4B;
    --warn:#B26A00;
    --err:#C0341D;
    --ease:cubic-bezier(.2,.6,.2,1);
    --side:248px;
    --top:64px;
  }
  *{margin:0;padding:0;box-sizing:border-box;border-radius:0;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:var(--font-d);background:var(--porcelain);color:var(--ink);
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none;}
  button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;border-radius:0;}
  button{cursor:pointer;background:none;border:none;}
  table{border-collapse:collapse;width:100%;}
  [hidden]{display:none!important;}
  :focus-visible{outline:2px solid var(--blue);outline-offset:2px;}

  /* ---------------- shell ---------------- */
  .shell{display:flex;min-height:100vh;}

  /* ---------------- sidebar ---------------- */
  .side{
    width:var(--side);flex:none;background:var(--ink);color:#fff;
    display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:50;
  }
  .side-brand{
    height:var(--top);display:flex;align-items:center;gap:11px;
    padding:0 20px;border-bottom:1px solid rgba(255,255,255,.1);flex:none;
  }
  .side-brand .mark{width:26px;height:26px;background:var(--blue);flex:none;display:grid;place-items:center;}
  .side-brand .mark svg{width:16px;height:16px;fill:var(--ink);}
  .side-brand b{font-family:var(--font-s);font-weight:400;font-size:12px;letter-spacing:.22em;text-transform:uppercase;}
  .side-nav{flex:1;overflow-y:auto;padding:16px 0 24px;}
  .nav-g{margin-bottom:20px;}
  .nav-g h4{
    font-family:var(--font-s);font-size:9.5px;letter-spacing:.26em;text-transform:uppercase;
    color:#6B7683;padding:0 20px;margin-bottom:8px;
  }
  .nav-i{
    display:flex;align-items:center;gap:11px;width:100%;text-align:left;
    padding:10px 20px;font-size:13px;font-weight:500;color:#C7CDD4;
    border-left:2px solid transparent;transition:background .16s var(--ease),color .16s var(--ease);
  }
  .nav-i svg{width:15px;height:15px;flex:none;stroke:currentColor;stroke-width:1.7;fill:none;}
  .nav-i:hover{background:rgba(255,255,255,.05);color:#fff;}
  .nav-i.on{background:rgba(0,164,255,.12);border-left-color:var(--blue);color:#fff;}
  .nav-i .pill{
    margin-left:auto;background:var(--blue);color:var(--ink);font-size:10px;font-weight:800;
    padding:2px 6px;letter-spacing:.04em;
  }
  .nav-i .pill.warn{background:var(--warn);color:#fff;}
  .side-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.1);flex:none;}
  .side-foot p{font-size:10.5px;color:#6B7683;line-height:1.6;}

  /* ---------------- main ---------------- */
  .main{flex:1;margin-left:var(--side);min-width:0;display:flex;flex-direction:column;}
  .top{
    height:var(--top);flex:none;background:var(--white);border-bottom:1px solid var(--hair);
    display:flex;align-items:center;gap:16px;padding:0 clamp(16px,2.5vw,28px);
    position:sticky;top:0;z-index:40;
  }
  .top h1{font-weight:800;font-stretch:112%;font-size:17px;letter-spacing:-.01em;text-transform:uppercase;}
  .top .crumb{font-family:var(--font-s);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut-2);display:block;margin-bottom:1px;}
  .top-r{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .who{display:flex;align-items:center;gap:9px;padding-left:12px;border-left:1px solid var(--hair);}
  .who .av{width:28px;height:28px;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800;flex:none;}
  .who-t{line-height:1.25;}
  .who-t b{display:block;font-size:12px;font-weight:700;}
  .who-t span{font-size:10.5px;color:var(--mut-2);}
  .content{padding:clamp(18px,2.6vw,30px);flex:1;min-width:0;}

  /* ---------------- primitives ---------------- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    font-weight:700;font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;
    padding:10px 16px;background:var(--ink);color:#fff;border:1px solid var(--ink);
    transition:background .18s var(--ease),color .18s var(--ease),border-color .18s var(--ease);white-space:nowrap;
  }
  .btn:hover{background:var(--blue);border-color:var(--blue);color:var(--ink);}
  .btn.ghost{background:transparent;color:var(--ink);border-color:var(--hair);}
  .btn.ghost:hover{border-color:var(--blue-ink);color:var(--blue-ink);background:transparent;}
  .btn.danger{background:var(--err);border-color:var(--err);color:#fff;}
  .btn.danger:hover{background:#9E2916;border-color:#9E2916;color:#fff;}
  .btn.sm{padding:7px 11px;font-size:10.5px;}
  .btn:disabled{opacity:.38;pointer-events:none;}
  .btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;}

  .card{background:var(--white);border:1px solid var(--hair);min-width:0;}
  .card-h{padding:15px 18px;border-bottom:1px solid var(--hair-soft);display:flex;align-items:center;gap:12px;}
  .card-h h3{font-weight:800;font-size:12px;letter-spacing:.14em;text-transform:uppercase;}
  .card-h .r{margin-left:auto;display:flex;gap:8px;align-items:center;}
  .card-b{padding:18px;}

  .in{
    width:100%;padding:10px 12px;border:1px solid var(--hair);background:var(--white);
    font-size:13px;outline:none;transition:border-color .18s var(--ease);
  }
  .in:focus{border-color:var(--ink);}
  .in:disabled{background:var(--porcelain);color:var(--mut-2);}
  textarea.in{resize:vertical;min-height:76px;line-height:1.55;}
  .lab{display:block;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--mut-2);margin-bottom:6px;}
  .fld{margin-bottom:14px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .hint{font-size:11px;color:var(--mut-2);margin-top:5px;line-height:1.5;}

  .tag{
    display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;
    letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;
    background:var(--porcelain);color:var(--mut);border:1px solid var(--hair);white-space:nowrap;
  }
  .tag.ok{background:rgba(27,138,75,.1);color:var(--ok);border-color:rgba(27,138,75,.3);}
  .tag.warn{background:rgba(178,106,0,.1);color:var(--warn);border-color:rgba(178,106,0,.3);}
  .tag.err{background:rgba(192,52,29,.1);color:var(--err);border-color:rgba(192,52,29,.3);}
  .tag.blue{background:rgba(0,109,179,.1);color:var(--blue-ink);border-color:rgba(0,109,179,.3);}
  .tag.ink{background:var(--ink);color:#fff;border-color:var(--ink);}

  /* ---------------- table ---------------- */
  .tbl-wrap{overflow-x:auto;max-width:100%;}
  .tbl{font-size:13px;}
  .tbl th{
    text-align:left;font-size:9.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;
    color:var(--mut-2);padding:11px 14px;border-bottom:1px solid var(--hair);white-space:nowrap;background:var(--white);
  }
  .tbl td{padding:12px 14px;border-bottom:1px solid var(--hair-soft);vertical-align:middle;}
  .tbl tbody tr{transition:background .14s var(--ease);}
  .tbl tbody tr:hover{background:var(--porcelain);}
  .tbl tbody tr.clk{cursor:pointer;}
  .tbl .num{text-align:right;font-variant-numeric:tabular-nums;}
  .tbl b{font-weight:700;}
  .tbl .sub{font-size:11.5px;color:var(--mut-2);}
  .empty{padding:44px 20px;text-align:center;color:var(--mut-2);font-size:13px;}

  /* ---------------- kpi ---------------- */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1px;background:var(--hair);border:1px solid var(--hair);margin-bottom:22px;}
  .kpi{background:var(--white);padding:18px;}
  .kpi .k{font-family:var(--font-s);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut-2);}
  .kpi .v{font-weight:800;font-stretch:118%;font-size:1.9rem;letter-spacing:-.02em;line-height:1.1;margin-top:8px;}
  .kpi .d{font-size:11px;color:var(--mut);margin-top:4px;}
  .kpi .v.blue{color:var(--blue-ink);}

  /* ---------------- toolbar ---------------- */
  .bar{display:flex;align-items:center;gap:9px;margin-bottom:16px;flex-wrap:wrap;}
  .chip{
    font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    padding:8px 13px;border:1px solid var(--hair);background:var(--white);color:var(--mut);
    transition:all .18s var(--ease);
  }
  .chip:hover{border-color:var(--ink);color:var(--ink);}
  .chip.on{background:var(--ink);border-color:var(--ink);color:#fff;}
  .bar .sp{margin-left:auto;display:flex;gap:9px;align-items:center;}
  .srch{position:relative;}
  .srch input{padding-left:32px;width:210px;}
  .srch svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--mut-2);stroke-width:2;fill:none;pointer-events:none;}

  /* ---------------- drawer ---------------- */
  .scrim{position:fixed;inset:0;background:rgba(14,17,22,.5);z-index:60;opacity:0;pointer-events:none;transition:opacity .25s var(--ease);}
  .scrim.on{opacity:1;pointer-events:auto;}
  .drw{
    position:fixed;top:0;right:0;bottom:0;width:min(560px,100%);background:var(--white);z-index:61;
    transform:translateX(100%);transition:transform .3s var(--ease);display:flex;flex-direction:column;
  }
  .drw.on{transform:none;}
  .drw-h{padding:18px 20px;border-bottom:1px solid var(--hair);display:flex;align-items:flex-start;gap:12px;flex:none;}
  .drw-h h2{font-weight:800;font-size:16px;letter-spacing:-.005em;line-height:1.25;}
  .drw-h .k{font-family:var(--font-s);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut-2);margin-bottom:5px;}
  .drw-x{margin-left:auto;width:32px;height:32px;border:1px solid var(--hair);display:grid;place-items:center;flex:none;}
  .drw-x:hover{border-color:var(--ink);}
  .drw-x svg{width:13px;height:13px;stroke:var(--ink);stroke-width:2;fill:none;}
  .drw-b{padding:20px;overflow-y:auto;flex:1;}
  .drw-f{padding:14px 20px;border-top:1px solid var(--hair);display:flex;gap:9px;align-items:center;flex:none;background:var(--porcelain);}
  .drw-f .sp{margin-left:auto;display:flex;gap:9px;}

  /* ---------------- timeline ---------------- */
  .tl{position:relative;padding-left:20px;}
  .tl::before{content:"";position:absolute;left:3px;top:5px;bottom:5px;width:1px;background:var(--hair);}
  .tl-i{position:relative;padding-bottom:16px;}
  .tl-i::before{content:"";position:absolute;left:-20px;top:4px;width:7px;height:7px;background:var(--hair);}
  .tl-i.done::before{background:var(--blue);}
  .tl-i b{display:block;font-size:12.5px;font-weight:700;}
  .tl-i span{font-size:11px;color:var(--mut-2);}

  /* ---------------- misc ---------------- */
  .toast{
    position:fixed;left:50%;bottom:26px;transform:translate(-50%,14px);z-index:80;
    background:var(--ink);color:#fff;padding:13px 20px;font-size:12.5px;font-weight:600;
    opacity:0;pointer-events:none;transition:opacity .22s var(--ease),transform .22s var(--ease);
    display:flex;align-items:center;gap:12px;max-width:min(520px,92vw);
  }
  .toast.on{opacity:1;transform:translate(-50%,0);}
  .toast b{color:var(--blue);}
  .banner{
    background:#FFF6E5;border:1px solid rgba(178,106,0,.35);padding:12px 15px;
    font-size:12px;color:#7A4A00;line-height:1.6;margin-bottom:20px;display:flex;gap:11px;align-items:flex-start;
  }
  .banner svg{width:15px;height:15px;stroke:var(--warn);stroke-width:2;fill:none;flex:none;margin-top:1px;}
  .banner b{font-weight:800;}
  .split{display:grid;grid-template-columns:1.6fr 1fr;gap:20px;align-items:start;}
  .split > *{min-width:0;}
  .rows > div{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--hair-soft);font-size:13px;}
  .rows > div:last-child{border-bottom:none;}
  .rows span{color:var(--mut);}
  .rows b{font-weight:700;text-align:right;}
  .perm{font-size:12px;}
  .perm th,.perm td{padding:9px 12px;border:1px solid var(--hair-soft);text-align:center;}
  .perm th:first-child,.perm td:first-child{text-align:left;}
  .perm .y{color:var(--ok);font-weight:800;}
  .perm .n{color:var(--hair);}
  .sec-h{font-weight:800;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut-2);margin:22px 0 10px;}
  .sec-h:first-child{margin-top:0;}

  @media (max-width:1080px){
    .split{grid-template-columns:1fr;}
  }
  @media (max-width:860px){
    :root{--side:0px;}
    .side{transform:translateX(-100%);transition:transform .3s var(--ease);width:248px;}
    .side.on{transform:none;}
    .main{margin-left:0;}
    .burger{display:grid!important;}
  }
  .burger{display:none;width:34px;height:34px;border:1px solid var(--hair);place-items:center;}
  .burger svg{width:15px;height:15px;stroke:var(--ink);stroke-width:2;fill:none;}

  /* ---------------- media grid ---------------- */
  .media{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .media .slot{
    position:relative;aspect-ratio:1/1;background:var(--porcelain);border:1px dashed var(--hair);
    display:grid;place-items:center;overflow:hidden;cursor:pointer;
    transition:border-color .18s var(--ease),background .18s var(--ease);
  }
  .media .slot:hover{border-color:var(--ink);}
  .media .slot.filled{border-style:solid;cursor:default;}
  .media .slot img,.media .slot video{width:100%;height:100%;object-fit:cover;display:block;}
  .media .slot .add{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--mut-2);font-size:10px;letter-spacing:.14em;text-transform:uppercase;text-align:center;padding:6px;}
  .media .slot .add svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.6;fill:none;}
  .media .slot .kind{position:absolute;left:6px;top:6px;background:var(--ink);color:#fff;font-size:9px;font-weight:800;letter-spacing:.1em;padding:2px 5px;text-transform:uppercase;}
  .media .slot .cover{position:absolute;right:6px;top:6px;background:var(--blue);color:var(--ink);font-size:9px;font-weight:800;letter-spacing:.1em;padding:2px 5px;text-transform:uppercase;}
  .media .slot .del{
    position:absolute;right:6px;bottom:6px;width:24px;height:24px;background:rgba(14,17,22,.85);
    color:#fff;display:grid;place-items:center;opacity:0;transition:opacity .16s var(--ease);
  }
  .media .slot:hover .del{opacity:1;}
  .media .slot .del svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.4;fill:none;}
  .media .slot .setcover{
    position:absolute;left:6px;bottom:6px;background:rgba(255,255,255,.94);color:var(--ink);
    font-size:9px;font-weight:800;letter-spacing:.1em;padding:3px 6px;text-transform:uppercase;
    opacity:0;transition:opacity .16s var(--ease);
  }
  .media .slot:hover .setcover{opacity:1;}
  @media (max-width:520px){ .media{grid-template-columns:repeat(3,1fr);} }

  /* ---------------- variants table ---------------- */
  .vartbl{width:100%;font-size:12.5px;border:1px solid var(--hair-soft);}
  .vartbl th,.vartbl td{padding:8px 10px;border-bottom:1px solid var(--hair-soft);text-align:left;}
  .vartbl th{font-size:9.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--mut-2);background:var(--porcelain);}
  .vartbl input{padding:6px 8px;font-size:12.5px;border:1px solid var(--hair);width:100%;}
  .vartbl .drag{cursor:grab;color:var(--mut-2);width:22px;text-align:center;}
  .vartbl td.act{width:38px;text-align:center;}
  .vartbl .rm{width:26px;height:26px;border:1px solid var(--hair);display:inline-grid;place-items:center;}
  .vartbl .rm:hover{border-color:var(--err);color:var(--err);}
  .vartbl .rm svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.2;fill:none;}
  .vartbl .oos{color:var(--err);font-weight:700;}
  .vartbl .low{color:var(--warn);font-weight:700;}
  .rollup{display:flex;justify-content:space-between;padding:10px 12px;background:var(--porcelain);font-size:12px;border:1px solid var(--hair-soft);border-top:none;}
  .rollup b{font-weight:800;}
  @media (max-width:620px){
    .who-t{display:none;}
    .who{padding-left:8px;}
    .top{gap:9px;padding:0 14px;}
    .top h1{font-size:14px;}
    .top .crumb{font-size:9px;}
    #roleSel{max-width:112px;}
    .content{padding:14px;}
    .bar .sp{margin-left:0;width:100%;}
    .srch input{width:100%;}
    .srch{flex:1;}
  }
.skip{position:fixed;top:-64px;left:16px;z-index:300;background:var(--ink);color:#fff;padding:13px 18px;font-family:var(--font-d);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;transition:top .2s ease}.skip:focus{top:12px;outline:2px solid var(--blue)}.nojs{max-width:1220px;margin:0 auto;padding:clamp(48px,6vw,88px) clamp(20px,4vw,48px)}.nojs-e{font-family:var(--font-s);font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--blue-ink);margin-bottom:22px}.nojs-h{font-family:var(--font-d);font-weight:800;font-stretch:112%;font-size:clamp(1.6rem,3.4vw,2.4rem);line-height:1.05;letter-spacing:-.015em;max-width:20ch}.nojs-p{color:var(--mut);margin-top:20px;max-width:56ch}.nojs-a{display:inline-block;margin-top:28px;background:var(--ink);color:#fff;padding:14px 22px;font-family:var(--font-d);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
.gate{position:fixed;inset:0;z-index:200;background:var(--ink);display:flex;align-items:center;justify-content:center;padding:24px;}
.gate[hidden]{display:none;}
body.locked .shell,body.locked .drw,body.locked .scrim{display:none;}
.gate-in{width:100%;max-width:420px;text-align:left;}
.gate-mark{display:inline-flex;width:34px;height:34px;align-items:center;justify-content:center;background:var(--blue);margin-bottom:22px;}
.gate-mark svg{width:20px;height:20px;fill:var(--ink);}
.gate-k{font-family:var(--font-d);font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin:0 0 10px;}
.gate-h{font-family:var(--font-s);font-size:30px;font-weight:400;line-height:1.15;color:var(--white);margin:0 0 12px;}
.gate-p{font-family:var(--font-d);font-size:13px;line-height:1.6;color:var(--mut-2);margin:0 0 24px;}
.gate .btn{width:100%;}
.gate[data-state="working"] .btn,.gate[data-state="error"] .btn{opacity:.45;pointer-events:none;}
.gate-spin{margin-top:18px;}
.gate-spin span{display:block;width:20px;height:20px;border:2px solid var(--ink-3);border-top-color:var(--blue);animation:gspin .7s linear infinite;}
@keyframes gspin{to{transform:rotate(360deg)}}
.gate-err{font-family:var(--font-d);font-size:12.5px;line-height:1.6;color:var(--white);background:var(--err);padding:12px 14px;margin:18px 0 0;}
</style>
<script src="vendor/firebase-app-compat.js"></script>
<script src="vendor/firebase-auth-compat.js"></script>
<script src="pfa-firebase-config.js"></script>
<script src="pfa-admin-auth.js"></script>
</head>

var DB = (function(){
  var KEY = "pfa_console_v3", mem = null;
  function seed(){
    return { products: SEED_PRODUCTS.slice(), orders: seedOrders(), patrons: seedPatrons(),
             content: SEED_CONTENT.slice(), adoptions: SEED_ADOPT.slice(), team: SEED_TEAM.slice(),
             funds: SEED_FUNDS.slice(), donations: seedDonations(), adoptapps: seedAdoptApps(),
             volunteers: seedVolunteers(), units: SEED_UNITS.slice(), xplaces: SEED_XPLACES.slice(),
             services: SEED_SERVICES.slice(), events: SEED_EVENTS.slice(), submissions: SEED_SUBMISSIONS.slice(),
             quiz: SEED_QUIZ.slice(), heat: SEED_HEAT.slice(), settings: SEED_SETTINGS.slice(), audit: [] };
  }
  function load(){
    if (mem) return mem;
    try { var raw = localStorage.getItem(KEY); mem = raw ? JSON.parse(raw) : seed(); }
    catch (e) { mem = seed(); }
    return mem;
  }
  function flush(){ try { localStorage.setItem(KEY, JSON.stringify(mem)); } catch (e) {} }
  function log(action, coll, id, detail){
    load().audit.unshift({ id: "a" + Date.now() + Math.random().toString(36).slice(2, 6),
      at: new Date().toISOString(), actor: actor.name, role: actor.role,
      action: action, coll: coll, ref: id, detail: detail || "" });
    if (mem.audit.length > 400) mem.audit.length = 400;
  }
  return {
    list: function(coll, filter){
      return Promise.resolve(load()[coll].filter(filter || function(){ return true; }).slice());
    },
    get: function(coll, id){
      return Promise.resolve(load()[coll].filter(function(d){ return d.id === id; })[0] || null);
    },
    add: function(coll, doc){
      load()[coll].unshift(doc); log("create", coll, doc.id, doc.name || doc.title || ""); flush();
      return Promise.resolve(doc);
    },
    put: function(coll, id, patch, note){
      var d = load()[coll].filter(function(x){ return x.id === id; })[0];
      if (!d) return Promise.reject(new Error("not found: " + coll + "/" + id));
      Object.keys(patch).forEach(function(k){ d[k] = patch[k]; });
      log("update", coll, id, note || Object.keys(patch).join(", ")); flush();
      return Promise.resolve(d);
    },
    remove: function(coll, id){
      var a = load()[coll], i = a.findIndex(function(x){ return x.id === id; });
      if (i > -1) a.splice(i, 1);
      log("delete", coll, id, ""); flush();
      return Promise.resolve(true);
    },
    reset: function(){ mem = seed(); flush(); return Promise.resolve(true); },
    _log: log, _flush: flush
  };
})();

function when(iso){
  var d = new Date(iso), now = new Date(), ms = now - d, day = 864e5;
  if (ms < 0) return "in " + Math.ceil(-ms / day) + "d";
  if (ms < 36e5) return Math.max(1, Math.round(ms / 6e4)) + "m ago";
  if (ms < day) return Math.round(ms / 36e5) + "h ago";
  if (ms < 30 * day) return Math.round(ms / day) + "d ago";
  return d.toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" });
}

/* ---------------- catalogue ---------------- */
var catFilter = "all", catQ = "";
VIEWS.catalogue = function(){
  return DB.list("products").then(function(ps){
    var cats = ["all"].concat(ps.map(function(p){ return p.cat; }).filter(function(v, i, a){ return a.indexOf(v) === i; }));
    var list = ps.filter(function(p){
      return (catFilter === "all" || p.cat === catFilter) &&
        (!catQ || (p.name + " " + p.spec + " " + p.id).toLowerCase().indexOf(catQ) > -1);
    });
    function totalStock(p){
      if (p.variants && p.variants.length) return p.variants.reduce(function(a, v){ return a + (+v.qty || 0); }, 0);
      return +p.stock || 0;
    }
    function cover(p){
      if (!p.media || !p.media.length) return "";
      var c = p.media.find(function(m){ return m.kind === "photo" && m.cover; }) || p.media.find(function(m){ return m.kind === "photo"; });
      return c ? c.src : "";
    }
    function thumb(p){
      var src = cover(p);
      if (src) return '<div style="width:44px;height:44px;background:var(--porcelain);overflow:hidden;flex:none;"><img src="' + esc(src) + '" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"></div>';
      return '<div style="width:44px;height:44px;background:var(--porcelain);border:1px dashed var(--hair);display:grid;place-items:center;flex:none;color:var(--mut-2);"><svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;stroke-width:1.6;fill:none;"><path d="M4 5h16v14H4zM4 15l4-4 5 5 3-3 4 4"/></svg></div>';
    }
    return '<div class="bar">' + cats.map(function(c){
      return '<button class="chip' + (catFilter === c ? " on" : "") + '" data-f="' + c + '">' + esc(c) + "</button>";
    }).join("") + '<div class="sp"><div class="srch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-5-5"/></svg>' +
      '<input class="in" id="q" placeholder="Search catalogue" value="' + esc(catQ) + '"></div>' +
      (can("catalogue.write") ? '<button class="btn" id="newP"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>New product</button>' : "") + "</div></div>" +
      '<div class="card"><div class="tbl-wrap"><table class="tbl"><thead><tr><th></th><th>Product</th><th>Category</th><th class="num">Price</th><th class="num">Patron</th><th class="num">Variants</th><th class="num">Stock</th><th>Status</th><th></th></tr></thead><tbody>' +
      (list.length ? list.map(function(p){
        var st = totalStock(p);
        var vCount = (p.variants && p.variants.length) || 1;
        var vLabel = vCount === 1 && p.variants && p.variants[0] && p.variants[0].size === "One size" ? "One size" : (vCount + (vCount === 1 ? " variant" : " variants"));
        var mCount = (p.media && p.media.length) || 0;
        return '<tr class="clk" data-p="' + p.id + '">' +
          '<td style="width:60px;">' + thumb(p) + "</td>" +
          '<td><b>' + esc(p.name) + "</b>" +
          '<div class="sub">' + esc(p.id) + (p.tag ? " - " + esc(p.tag) : "") + (mCount ? " - " + mCount + " media" : "") + "</div></td>" +
          "<td>" + esc(p.cat) + '</td><td class="num">' + inr(p.price) + '</td><td class="num">' + inr(p.mprice) +
          '</td><td class="num sub">' + esc(vLabel) + '</td>' +
          '<td class="num">' + (st === 0 ? '<span class="tag err">Out</span>' : st <= 6 ? '<span class="tag warn">' + st + "</span>" : st) +
          "</td><td>" + badge(p.status) + '</td><td class="num"><button class="btn ghost sm" data-edit="' + p.id + '">' + (can("catalogue.write") ? "Edit" : "View") + "</button></td></tr>";
      }).join("") : '<tr><td colspan="9"><div class="empty">Nothing matches</div></td></tr>') + "</tbody></table></div></div>";
  });
};

function productDrawer(id){
  var blank = { id:"", cat:"apparel", name:"", price:0, mprice:0, spec:"", tag:"", status:"live",
                variants:[{ size:"One size", sku_suffix:"OS", qty:0, weight_g:null }], media:[] };
  (id ? DB.get("products", id) : Promise.resolve(blank)).then(function(d){
    // draft state - all edits mutate this, save() persists it
    var draft = JSON.parse(JSON.stringify(d));
    if (!draft.variants || !draft.variants.length) draft.variants = [{ size:"One size", sku_suffix:"OS", qty:0, weight_g:null }];
    if (!draft.media) draft.media = [];
    var rw = can("catalogue.write");

    function totalStock(){ return draft.variants.reduce(function(a, v){ return a + (+v.qty || 0); }, 0); }
    function mediaCount(kind){ return draft.media.filter(function(m){ return m.kind === kind; }).length; }
    function coverIdx(){ var i = draft.media.findIndex(function(m){ return m.cover; }); return i > -1 ? i : (draft.media.length ? 0 : -1); }

    function mediaSlots(){
      // 4 photo slots + 1 video slot, always rendered
      var html = "";
      for (var i = 0; i < 4; i++){
        var photos = draft.media.filter(function(m){ return m.kind === "photo"; });
        var m = photos[i];
        html += slotHTML(m, "photo", i);
      }
      var vids = draft.media.filter(function(m){ return m.kind === "video"; });
      html += slotHTML(vids[0], "video", 0);
      return html;
    }
    function slotHTML(m, kind, i){
      if (!m) {
        return '<label class="slot" data-add="' + kind + '">' +
          '<div class="add"><svg viewBox="0 0 24 24">' +
            (kind === "photo" ? '<path d="M4 5h16v14H4zM4 15l4-4 5 5 3-3 4 4M9 10a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/>' : '<path d="M3 6h13v12H3zM16 10l5-3v10l-5-3z"/>') +
          "</svg>" + (kind === "photo" ? "Photo " + (i + 1) : "Video") + "</div>" +
          '<input type="file" accept="' + (kind === "photo" ? "image/*" : "video/*") + '" hidden data-fin="' + kind + '"></label>';
      }
      var iSrc = m.kind === "photo"
        ? '<img src="' + esc(m.src) + '" alt="">'
        : '<video src="' + esc(m.src) + '" muted></video>';
      var isCover = m.cover;
      return '<div class="slot filled">' + iSrc +
        '<span class="kind">' + m.kind + "</span>" +
        (isCover ? '<span class="cover">Cover</span>' : '<button class="setcover" data-cov="' + m.id + '">Set cover</button>') +
        (rw ? '<button class="del" data-del="' + m.id + '" aria-label="Remove"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>' : "") +
        "</div>";
    }

    function variantsHTML(){
      var singleVariantCats = ["paper","pins","home"];
      var sizeLabel = draft.cat === "caps" ? "Fit" : "Size";
      return '<table class="vartbl"><thead><tr><th style="width:34px;">#</th><th>' + sizeLabel + '</th><th style="width:120px;">SKU suffix</th><th style="width:100px;">Qty</th><th style="width:90px;">Weight (g)</th><th class="act"></th></tr></thead><tbody id="varRows">' +
        draft.variants.map(function(v, i){
          var oos = (+v.qty || 0) === 0, low = (+v.qty || 0) > 0 && (+v.qty || 0) <= 3;
          return '<tr data-vr="' + i + '">' +
            '<td class="drag">' + (i + 1) + "</td>" +
            '<td><input data-vf="size:' + i + '" value="' + esc(v.size) + '"' + (rw ? "" : " disabled") + "></td>" +
            '<td><input data-vf="sku_suffix:' + i + '" value="' + esc(v.sku_suffix) + '" placeholder="M"' + (rw ? "" : " disabled") + "></td>" +
            '<td><input data-vf="qty:' + i + '" type="number" min="0" value="' + (+v.qty || 0) + '" class="' + (oos ? "oos" : low ? "low" : "") + '"' + (rw ? "" : " disabled") + "></td>" +
            '<td><input data-vf="weight_g:' + i + '" type="number" min="0" value="' + (v.weight_g || "") + '" placeholder="-"' + (rw ? "" : " disabled") + "></td>" +
            '<td class="act">' + (rw && draft.variants.length > 1 ? '<button class="rm" data-vrm="' + i + '" aria-label="Remove"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>' : "") + "</td>" +
            "</tr>";
        }).join("") + "</tbody></table>" +
        '<div class="rollup"><span>Total stock across variants</span><b id="rollup">' + totalStock() + " units</b></div>" +
        (rw ? '<button class="btn ghost sm" id="addVar" style="margin-top:10px;"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Add ' + sizeLabel.toLowerCase() + "</button>" : "") +
        (singleVariantCats.indexOf(draft.cat) > -1 && draft.variants.length === 1
          ? '<p class="hint">Single-variant category. Add variants only if you introduce sizes or editions.</p>' : "");
    }

    function drawer(){
      var body =
        '<p class="sec-h">Media <span class="tag" style="margin-left:8px;">Up to 4 photos, 1 video</span></p>' +
        '<div class="media" id="media">' + mediaSlots() + "</div>" +
        '<p class="hint" style="margin-top:8px;">First photo is the cover by default. Hover a filled slot to change it, or remove media. In production these upload to storage - here they save as data URLs.</p>' +

        '<p class="sec-h">Details</p>' +
        '<div class="fld"><label class="lab" for="f_name">Name</label><input class="in" id="f_name" value="' + esc(draft.name) + '"' + (rw ? "" : " disabled") + "></div>" +
        '<div class="grid2"><div class="fld"><label class="lab" for="f_id">SKU</label><input class="in" id="f_id" value="' + esc(draft.id) + '"' + (id || !rw ? " disabled" : "") + ">" +
          (id ? '<p class="hint">The SKU is the key the storefront reads. It cannot change.</p>' : "") + "</div>" +
        '<div class="fld"><label class="lab" for="f_cat">Category</label><select class="in" id="f_cat"' + (rw ? "" : " disabled") + ">" +
          ["caps","apparel","bags","paper","pets","pins","home"].map(function(c){ return '<option value="' + c + '"' + (draft.cat === c ? " selected" : "") + ">" + c + "</option>"; }).join("") + "</select></div></div>" +

        '<div class="grid2"><div class="fld"><label class="lab" for="f_price">Price</label><input class="in" id="f_price" type="number" min="0" value="' + draft.price + '"' + (rw ? "" : " disabled") + "></div>" +
        '<div class="fld"><label class="lab" for="f_mprice">Patron price</label><input class="in" id="f_mprice" type="number" min="0" value="' + draft.mprice + '"' + (rw ? "" : " disabled") + '><p class="hint" id="marginHint"></p></div></div>' +

        '<div class="fld"><label class="lab" for="f_spec">Spec</label><textarea class="in" id="f_spec"' + (rw ? "" : " disabled") + ">" + esc(draft.spec) + "</textarea></div>" +

        '<div class="grid2"><div class="fld"><label class="lab" for="f_status">Status</label><select class="in" id="f_status"' + (rw ? "" : " disabled") + '><option value="live"' + (draft.status === "live" ? " selected" : "") + '>Live</option><option value="hidden"' + (draft.status === "hidden" ? " selected" : "") + ">Hidden</option></select></div>" +
        '<div class="fld"><label class="lab" for="f_tag">Tag</label><input class="in" id="f_tag" value="' + esc(draft.tag) + '" placeholder="Monsoon, Drop 01 and so on"' + (rw ? "" : " disabled") + "></div></div>" +

        '<p class="sec-h">Variants and stock</p>' +
        '<div id="varWrap">' + variantsHTML() + "</div>";

      var foot = rw
        ? '<button class="btn ghost" id="pCancel">Cancel</button><div class="sp">' +
          (id ? '<button class="btn danger" id="pDel">Delete</button>' : "") +
          '<button class="btn" id="pSave">' + (id ? "Save" : "Create") + "</button></div>"
        : '<button class="btn ghost" id="pCancel">Close</button><div class="sp"><span class="tag">Read only for ' + esc(ROLES[actor.role].name) + "</span></div>";
      openDrw(id ? "Product " + draft.id : "New product", draft.name || "Untitled", body, foot);
      wire();
    }

    function refreshMedia(){ $("#media").innerHTML = mediaSlots(); wireMedia(); }
    function refreshVariants(){ $("#varWrap").innerHTML = variantsHTML(); wireVariants(); }
    function refreshRollup(){ var el = $("#rollup"); if (el) el.textContent = totalStock() + " units"; }

    function wireMedia(){
      $$("[data-add]", $("#media")).forEach(function(lbl){
        var kind = lbl.dataset.add;
        var input = lbl.querySelector('[data-fin]');
        if (!input || !rw) return;
        input.addEventListener("change", function(e){
          var f = e.target.files && e.target.files[0]; if (!f) return;
          var limit = kind === "photo" ? 4 : 1;
          if (mediaCount(kind) >= limit) { toast(kind === "photo" ? "Up to 4 photos" : "Up to 1 video"); return; }
          // basic guards
          if (kind === "photo" && !/^image\//.test(f.type)) return toast("Please pick an image file");
          if (kind === "video" && !/^video\//.test(f.type)) return toast("Please pick a video file");
          var maxMB = kind === "photo" ? 5 : 25;
          if (f.size > maxMB * 1024 * 1024) return toast(kind + " must be under " + maxMB + " MB");
          var r = new FileReader();
          r.onload = function(){
            var m = { id:"m" + Date.now().toString(36) + Math.random().toString(36).slice(2,5),
                      kind:kind, src:r.result, name:f.name, size:f.size, type:f.type,
                      cover: kind === "photo" && draft.media.filter(function(x){ return x.kind === "photo"; }).length === 0 };
            draft.media.push(m); refreshMedia(); toast(kind[0].toUpperCase() + kind.slice(1) + " added");
          };
          r.readAsDataURL(f);
        });
      });
      $$("[data-del]", $("#media")).forEach(function(b){ b.addEventListener("click", function(e){
        e.preventDefault(); e.stopPropagation();
        var mid = b.dataset.del, m = draft.media.find(function(x){ return x.id === mid; });
        var wasCover = m && m.cover;
        draft.media = draft.media.filter(function(x){ return x.id !== mid; });
        // if the cover was removed, promote the first remaining photo
        if (wasCover) {
          var first = draft.media.find(function(x){ return x.kind === "photo"; });
          if (first) first.cover = true;
        }
        refreshMedia(); toast("Removed");
      }); });
      $$("[data-cov]", $("#media")).forEach(function(b){ b.addEventListener("click", function(e){
        e.preventDefault(); e.stopPropagation();
        var mid = b.dataset.cov;
        draft.media.forEach(function(x){ if (x.kind === "photo") x.cover = (x.id === mid); });
        refreshMedia(); toast("Cover set");
      }); });
    }

    function wireVariants(){
      $$("[data-vf]", $("#varWrap")).forEach(function(inp){ inp.addEventListener("input", function(){
        var p = inp.dataset.vf.split(":"), field = p[0], i = +p[1];
        var val = inp.value;
        if (field === "qty" || field === "weight_g") val = val === "" ? null : Math.max(0, +val || 0);
        draft.variants[i][field] = val;
        if (field === "qty") { refreshRollup();
          inp.classList.remove("oos","low");
          var q = +val || 0; if (q === 0) inp.classList.add("oos"); else if (q <= 3) inp.classList.add("low");
        }
      }); });
      $$("[data-vrm]", $("#varWrap")).forEach(function(b){ b.addEventListener("click", function(){
        if (draft.variants.length <= 1) return toast("Keep at least one variant");
        draft.variants.splice(+b.dataset.vrm, 1); refreshVariants();
      }); });
      var av = $("#addVar");
      if (av) av.addEventListener("click", function(){
        draft.variants.push({ size:"", sku_suffix:"", qty:0, weight_g:null }); refreshVariants();
        // focus the new row's size
        var rows = $$("[data-vr]", $("#varWrap")); var last = rows[rows.length - 1]; if (last) last.querySelector("input").focus();
      });
    }

    function margin(){
      var pr = +$("#f_price").value, mp = +$("#f_mprice").value, h = $("#marginHint");
      if (!h) return;
      h.textContent = mp > pr ? "Patron price is above list price" : pr ? "Patrons save " + inr(pr - mp) + " (" + Math.round((pr - mp) / pr * 100) + "%)" : "";
      h.style.color = mp > pr ? "var(--err)" : "";
    }

    function wire(){
      wireMedia(); wireVariants();
      if (rw) { ["f_price","f_mprice"].forEach(function(i){ $("#" + i).addEventListener("input", margin); }); margin(); }
      $("#pCancel").addEventListener("click", closeDrw);
      var del = $("#pDel");
      if (del) del.addEventListener("click", function(){
        if (!confirm("Delete " + draft.name + "? The storefront will stop listing it.")) return;
        DB.remove("products", draft.id).then(function(){ closeDrw(); toast("Deleted <b>" + esc(draft.name) + "</b>"); route(); });
      });
      var save = $("#pSave");
      if (save) save.addEventListener("click", function(){
        // validate top level
        var name = $("#f_name").value.trim();
        if (!name) return toast("Name is required");
        var price = +$("#f_price").value, mprice = +$("#f_mprice").value;
        if (mprice > price) return toast("Patron price cannot exceed list price");
        // validate variants
        var seen = {}, empties = 0, dupes = 0;
        for (var i = 0; i < draft.variants.length; i++){
          var v = draft.variants[i];
          if (!String(v.size || "").trim() || !String(v.sku_suffix || "").trim()) empties++;
          else if (seen[v.sku_suffix]) dupes++;
          seen[v.sku_suffix] = true;
        }
        if (empties) return toast(empties + " variant" + (empties > 1 ? "s are" : " is") + " missing size or SKU suffix");
        if (dupes) return toast("Two variants share a SKU suffix");
        // ensure cover exists if any photos
        var hasPhotos = draft.media.some(function(m){ return m.kind === "photo"; });
        if (hasPhotos && !draft.media.some(function(m){ return m.cover; })) {
          var first = draft.media.find(function(m){ return m.kind === "photo"; });
          if (first) first.cover = true;
        }
        var patch = {
          name:name, cat:$("#f_cat").value, price:price, mprice:mprice,
          spec:$("#f_spec").value.trim(), status:$("#f_status").value, tag:$("#f_tag").value.trim(),
          variants: draft.variants.map(function(v){ return { size:String(v.size).trim(), sku_suffix:String(v.sku_suffix).trim(), qty: +v.qty || 0, weight_g: v.weight_g == null || v.weight_g === "" ? null : +v.weight_g }; }),
          stock: totalStock(),
          media: draft.media
        };
        if (id) DB.put("products", id, patch, "edited " + patch.name + " - " + patch.variants.length + " variants - " + patch.media.length + " media").then(done);
        else {
          var sku = $("#f_id").value.trim();
          if (!sku) return toast("SKU is required");
          if (!/^[a-z0-9]+$/i.test(sku)) return toast("SKU must be alphanumeric");
          DB.get("products", sku).then(function(x){
            if (x) return toast("SKU <b>" + esc(sku) + "</b> already exists");
            patch.id = sku; DB.add("products", patch).then(done);
          });
        }
        function done(){ closeDrw(); toast("Saved <b>" + esc(patch.name) + "</b>"); route(); }
      });
    }

    drawer();
  });
}

WIRE.orders = function(){
  $$("[data-of]").forEach(function(b){ b.addEventListener("click", function(){ ordFilter = b.dataset.of; route(); }); });
  $$("[data-o]").forEach(function(tr){ tr.addEventListener("click", function(){ orderDrawer(tr.dataset.o); }); });
};
var NEXT = { placed:"packed", packed:"shipped", shipped:"delivered" };
function orderDrawer(id){
  DB.get("orders", id).then(function(o){
    var rw = can("orders.write");
    var body =
      '<div class="rows" style="margin-bottom:18px;">' +
        "<div><span>Status</span><b>" + badge(o.status) + "</b></div>" +
        "<div><span>Customer</span><b>" + esc(o.customer) + "</b></div>" +
        "<div><span>Email</span><b>" + esc(o.email) + "</b></div>" +
        "<div><span>City</span><b>" + esc(o.city) + "</b></div>" +
        "<div><span>Placed</span><b>" + new Date(o.placedAt).toLocaleString("en-IN", { dateStyle:"medium", timeStyle:"short" }) + "</b></div>" +
        "<div><span>Pricing</span><b>" + (o.patron ? "Patron" : "Standard") + "</b></div>" +
      "</div>" +
      '<p class="sec-h">Items</p><table class="tbl" style="border:1px solid var(--hair-soft);"><tbody>' +
      o.items.map(function(i){
        return "<tr><td>" + esc(i.name) + '<div class="sub">' + esc(i.id) + " x " + i.qty + '</div></td><td class="num">' + inr(i.unit * i.qty) + "</td></tr>";
      }).join("") + "</tbody></table>" +
      '<div class="rows" style="margin-top:14px;">' +
        "<div><span>Subtotal</span><b>" + inr(o.subtotal) + "</b></div>" +
        "<div><span>Shipping</span><b>" + (o.shipping ? inr(o.shipping) : "Free") + "</b></div>" +
        "<div><span>Total</span><b>" + inr(o.total) + "</b></div>" +
      "</div>" +
      (o.refund ? '<p class="sec-h">Refund</p><div class="rows">' +
        "<div><span>Amount</span><b>" + inr(o.refund.amount) + "</b></div>" +
        "<div><span>Reason</span><b>" + esc(o.refund.reason) + "</b></div>" +
        "<div><span>State</span><b>" + esc(o.refund.state) + "</b></div></div>" : "") +
      '<p class="sec-h">Timeline</p><div class="tl">' + o.events.map(function(e){
        return '<div class="tl-i done"><b>' + esc(e.s) + "</b><span>" + new Date(e.t).toLocaleString("en-IN", { dateStyle:"medium", timeStyle:"short" }) + "</span></div>";
      }).join("") + "</div>";
    var acts = "";
    if (rw && NEXT[o.status]) acts += '<button class="btn" id="oNext">Mark ' + ST[NEXT[o.status]][1] + "</button>";
    if (rw && ["placed","packed"].indexOf(o.status) > -1) acts += '<button class="btn ghost" id="oCancel">Cancel order</button>';
    if (rw && o.status === "delivered") acts += '<button class="btn ghost" id="oRef">Start refund</button>';
    var foot = '<button class="btn ghost" id="oClose">Close</button><div class="sp">' + (acts || '<span class="tag">No actions for ' + esc(ROLES[actor.role].name) + "</span>") + "</div>";
    openDrw("Order " + o.id, o.customer, body, foot);
    $("#oClose").addEventListener("click", closeDrw);
    var nx = $("#oNext");
    if (nx) nx.addEventListener("click", function(){
      var s = NEXT[o.status], ev = o.events.concat([{ t:new Date().toISOString(), s:ST[s][1] }]);
      DB.put("orders", o.id, { status:s, events:ev }, o.id + " -> " + s).then(function(){
        toast("<b>" + o.id + "</b> marked " + ST[s][1].toLowerCase()); orderDrawer(o.id); route();
      });
    });
    var cx = $("#oCancel");
    if (cx) cx.addEventListener("click", function(){
      if (!confirm("Cancel " + o.id + "?")) return;
      var ev = o.events.concat([{ t:new Date().toISOString(), s:"Cancelled by " + actor.name }]);
      DB.put("orders", o.id, { status:"cancelled", events:ev }, o.id + " cancelled").then(function(){
        toast("<b>" + o.id + "</b> cancelled"); closeDrw(); route();
      });
    });
    var rf = $("#oRef");
    if (rf) rf.addEventListener("click", function(){ refundForm(o); });
  });
}
function refundForm(o){
  var body = '<div class="banner"><svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.3 3.9L2.4 17.5A2 2 0 0 0 4.1 20.5h15.8a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>' +
    "<span>This records the intent to refund. <b>No money moves.</b> A real refund needs the payment gateway API, which is not connected.</span></div>" +
    '<div class="fld"><label class="lab" for="r_amt">Amount</label><input class="in" id="r_amt" type="number" min="1" max="' + o.total + '" value="' + o.total + '"><p class="hint">Up to ' + inr(o.total) + ". Partial refunds are allowed.</p></div>" +
    '<div class="fld"><label class="lab" for="r_why">Reason</label><select class="in" id="r_why"><option>Arrived damaged</option><option>Size does not fit</option><option>Wrong item sent</option><option>Never arrived</option><option>Changed mind</option></select></div>' +
    '<div class="fld"><label class="lab" for="r_note">Note</label><textarea class="in" id="r_note" placeholder="Anything the finance team should know"></textarea></div>';
  openDrw("Refund " + o.id, o.customer, body, '<button class="btn ghost" id="rCancel">Back</button><div class="sp"><button class="btn danger" id="rGo">Request refund</button></div>');
  $("#rCancel").addEventListener("click", function(){ orderDrawer(o.id); });
  $("#rGo").addEventListener("click", function(){
    var amt = +$("#r_amt").value;
    if (!amt || amt > o.total) return toast("Enter an amount up to " + inr(o.total));
    var ev = o.events.concat([{ t:new Date().toISOString(), s:"Refund requested by " + actor.name }]);
    DB.put("orders", o.id, { status:"refund_requested", events:ev,
      refund:{ amount:amt, reason:$("#r_why").value, state:"pending", note:$("#r_note").value.trim(), by:actor.name } },
      "refund " + inr(amt) + " requested").then(function(){
      closeDrw(); toast("Refund requested on <b>" + o.id + "</b>. Finance can approve it."); route();
    });
  });
}

/* ---------------- refunds ---------------- */
VIEWS.refunds = function(){
  return DB.list("orders", function(o){ return !!o.refund; }).then(function(os){
    var pend = os.filter(function(o){ return o.refund.state === "pending"; });
    var done = os.filter(function(o){ return o.refund.state !== "pending"; });
    function tbl(list, showAct){
      return '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Order</th><th>Customer</th><th>Reason</th><th class="num">Amount</th><th class="num">Asked</th>' + (showAct ? "<th></th>" : "<th>State</th>") + "</tr></thead><tbody>" +
        (list.length ? list.map(function(o){
          return '<tr><td><b>' + o.id + '</b></td><td>' + esc(o.customer) + '<div class="sub">' + esc(o.city) + "</div></td>" +
            "<td>" + esc(o.refund.reason) + (o.refund.note ? '<div class="sub">' + esc(o.refund.note) + "</div>" : "") + "</td>" +
            '<td class="num"><b>' + inr(o.refund.amount) + '</b></td><td class="num sub">' + when(o.placedAt) + "</td>" +
            (showAct
              ? '<td class="num">' + (can("refunds.approve")
                  ? '<button class="btn sm" data-appr="' + o.id + '">Approve</button> <button class="btn ghost sm" data-rej="' + o.id + '">Reject</button>'
                  : '<span class="tag">Finance only</span>') + "</td>"
              : "<td>" + badge(o.refund.state === "approved" ? "refunded" : "cancelled") + "</td>") + "</tr>";
        }).join("") : '<tr><td colspan="6"><div class="empty">Nothing here</div></td></tr>') + "</tbody></table></div>";
    }
    return (can("refunds.approve") ? "" : '<div class="banner"><svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.3 3.9L2.4 17.5A2 2 0 0 0 4.1 20.5h15.8a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg><span>You are acting as <b>' + esc(ROLES[actor.role].name) + "</b>. Only Finance and Admin can approve refunds.</span></div>") +
      '<div class="kpis">' +
        kpi("Pending", pend.length, "waiting on finance") +
        kpi("Value pending", inr(pend.reduce(function(a, o){ return a + o.refund.amount; }, 0)), "if all are approved", true) +
        kpi("Settled", done.length, "approved or rejected") +
      "</div>" +
      '<div class="card" style="margin-bottom:20px;"><div class="card-h"><h3>Awaiting a decision</h3></div>' + tbl(pend, true) + "</div>" +
      '<div class="card"><div class="card-h"><h3>Settled</h3></div>' + tbl(done, false) + "</div>";
  });
};
WIRE.refunds = function(){
  $$("[data-appr]").forEach(function(b){ b.addEventListener("click", function(){ decide(b.dataset.appr, true); }); });
  $$("[data-rej]").forEach(function(b){ b.addEventListener("click", function(){ decide(b.dataset.rej, false); }); });
  function decide(id, ok){
    DB.get("orders", id).then(function(o){
      if (!confirm((ok ? "Approve" : "Reject") + " the " + inr(o.refund.amount) + " refund on " + id + "?")) return;
      var r = Object.assign({}, o.refund, { state: ok ? "approved" : "rejected", by: actor.name, at: new Date().toISOString() });
      var ev = o.events.concat([{ t:new Date().toISOString(), s:(ok ? "Refund approved by " : "Refund rejected by ") + actor.name }]);
      DB.put("orders", id, { refund:r, status: ok ? "refunded" : "delivered", events:ev },
        "refund " + (ok ? "approved" : "rejected")).then(function(){
        toast("Refund on <b>" + id + "</b> " + (ok ? "approved. Money still has to move through the gateway." : "rejected.")); route();
      });
    });
  }
};

/* ---------------- patrons ---------------- */
VIEWS.patrons = function(){
  return DB.list("patrons").then(function(ps){
    var act = ps.filter(function(p){ return p.status === "active"; });
    return '<div class="kpis">' +
      kpi("Active", act.length, "verified and paying") +
      kpi("Annual recurring", inr(act.length * 365), "at " + inr(365) + " each", true) +
      kpi("Pending", ps.filter(function(p){ return p.status === "pending"; }).length, "awaiting verification") +
      kpi("Expired", ps.filter(function(p){ return p.status === "expired"; }).length, "lapsed, worth a nudge") +
    "</div>" +
    '<div class="card"><div class="card-h"><h3>Patrons</h3></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Card</th><th>Name</th><th>Status</th><th>Card issued</th><th class="num">Since</th><th></th></tr></thead><tbody>' +
    ps.map(function(p){
      return '<tr><td><b>' + p.id + '</b></td><td>' + esc(p.name) + '<div class="sub">' + esc(p.city) + " - " + esc(p.email) + "</div></td>" +
        "<td>" + badge(p.status) + "</td><td>" + (p.card === "issued" ? '<span class="tag ok">Issued</span>' : '<span class="tag">Not issued</span>') + "</td>" +
        '<td class="num sub">' + when(p.since) + '</td><td class="num">' +
        (can("patrons.write")
          ? (p.status === "pending" ? '<button class="btn sm" data-ver="' + p.id + '">Verify</button>' : "") +
            (p.status === "active" ? '<button class="btn ghost sm" data-rev="' + p.id + '">Revoke</button>' : "")
          : '<span class="tag">Read only</span>') + "</td></tr>";
    }).join("") + "</tbody></table></div></div>" +
    '<div class="banner" style="margin-top:20px;"><svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.3 3.9L2.4 17.5A2 2 0 0 0 4.1 20.5h15.8a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg><span><b>The storefront does not check any of this.</b> Patron pricing in store.html reads a localStorage boolean, so anyone can switch it on from DevTools. Until a Cloud Function verifies patron status server side, this list and the discount are unrelated.</span></div>';
  });
};
WIRE.patrons = function(){
  $$("[data-ver]").forEach(function(b){ b.addEventListener("click", function(){
    DB.put("patrons", b.dataset.ver, { status:"active", card:"issued" }, "verified").then(function(){ toast("<b>" + b.dataset.ver + "</b> verified and card issued"); route(); });
  }); });
  $$("[data-rev]").forEach(function(b){ b.addEventListener("click", function(){
    if (!confirm("Revoke " + b.dataset.rev + "?")) return;
    DB.put("patrons", b.dataset.rev, { status:"expired", card:"not issued" }, "revoked").then(function(){ toast("<b>" + b.dataset.rev + "</b> revoked"); route(); });
  }); });
};

/* ---------------- content ---------------- */
var conFilter = "all";
VIEWS.content = function(){
  return DB.list("content").then(function(cs){
    var list = conFilter === "all" ? cs : cs.filter(function(c){ return c.status === conFilter; });
    var fs = ["all","draft","review","scheduled","published"];
    return '<div class="bar">' + fs.map(function(f){
      var n = f === "all" ? cs.length : cs.filter(function(c){ return c.status === f; }).length;
      return '<button class="chip' + (conFilter === f ? " on" : "") + '" data-cf="' + f + '">' + esc(f === "all" ? "All" : ST[f][1]) + " " + n + "</button>";
    }).join("") + '<div class="sp">' + (can("content.write") ? '<button class="btn" id="newC"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>New</button>' : "") + "</div></div>" +
    '<div class="card"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Title</th><th>Kind</th><th>Author</th><th>Status</th><th class="num">Updated</th></tr></thead><tbody>' +
    (list.length ? list.map(function(c){
      return '<tr class="clk" data-ci="' + c.id + '"><td><b>' + esc(c.title) + "</b>" + (c.note ? '<div class="sub">' + esc(c.note) + "</div>" : "") + "</td>" +
        '<td><span class="tag">' + esc(c.kind) + "</span></td><td>" + esc(c.author) + "</td><td>" + badge(c.status) + '</td><td class="num sub">' + when(c.updated) + "</td></tr>";
    }).join("") : '<tr><td colspan="5"><div class="empty">Nothing here</div></td></tr>') + "</tbody></table></div></div>";
  });
};
WIRE.content = function(){
  $$("[data-cf]").forEach(function(b){ b.addEventListener("click", function(){ conFilter = b.dataset.cf; route(); }); });
  $$("[data-ci]").forEach(function(tr){ tr.addEventListener("click", function(){ contentDrawer(tr.dataset.ci); }); });
  var nc = $("#newC"); if (nc) nc.addEventListener("click", function(){ contentDrawer(null); });
};
function contentDrawer(id){
  (id ? DB.get("content", id) : Promise.resolve({ id:"", kind:"story", title:"", status:"draft", author:actor.name, updated:new Date().toISOString(), note:"" }))
  .then(function(c){
    var rw = can("content.write");
    var body =
      '<div class="fld"><label class="lab" for="c_title">Title</label><input class="in" id="c_title" value="' + esc(c.title) + '"' + (rw ? "" : " disabled") + "></div>" +
      '<div class="grid2"><div class="fld"><label class="lab" for="c_kind">Kind</label><select class="in" id="c_kind"' + (rw ? "" : " disabled") + ">" +
      ["story","film","news"].map(function(k){ return '<option value="' + k + '"' + (c.kind === k ? " selected" : "") + ">" + k + "</option>"; }).join("") + "</select></div>" +
      '<div class="fld"><label class="lab">Status</label><div style="padding-top:8px;">' + badge(c.status) + "</div></div></div>" +
      '<div class="fld"><label class="lab" for="c_note">Reviewer note</label><textarea class="in" id="c_note"' + (rw ? "" : " disabled") + ">" + esc(c.note) + "</textarea>" +
      '<p class="hint">Visible to the team only. Never published.</p></div>' +
      '<p class="sec-h">Workflow</p><div class="tl">' +
      ["draft","review","scheduled","published"].map(function(s){
        var order = ["draft","review","scheduled","published"], done = order.indexOf(s) <= order.indexOf(c.status);
        return '<div class="tl-i' + (done ? " done" : "") + '"><b>' + ST[s][1] + "</b><span>" + (s === c.status ? "current - " + when(c.updated) : done ? "cleared" : "not yet") + "</span></div>";
      }).join("") + "</div>";
    var acts = "";
    if (rw && c.status === "draft") acts += '<button class="btn" id="cRev">Send to review</button>';
    if (c.status === "review") acts += can("content.publish")
      ? '<button class="btn" id="cPub">Publish</button><button class="btn ghost" id="cBack">Back to draft</button>'
      : '<span class="tag">Only Admin can publish</span>';
    if (can("content.publish") && c.status === "published") acts += '<button class="btn ghost" id="cUnpub">Unpublish</button>';
    var foot = '<button class="btn ghost" id="cClose">Close</button><div class="sp">' + (rw ? '<button class="btn ghost" id="cSave">Save</button>' : "") + acts + "</div>";
    openDrw(id ? "Content " + c.id : "New content", c.title || "Untitled", body, foot);
    $("#cClose").addEventListener("click", closeDrw);
    function fields(){ return { title:$("#c_title").value.trim(), kind:$("#c_kind").value, note:$("#c_note").value.trim(), updated:new Date().toISOString() }; }
    function persist(patch, msg){
      var f = Object.assign(fields(), patch);
      if (!f.title) return toast("Title is required");
      if (id) DB.put("content", id, f, msg || "edited").then(function(){ closeDrw(); toast(msg || "Saved"); route(); });
      else { f.id = "c" + Date.now().toString(36); f.status = patch.status || "draft"; f.author = actor.name;
             DB.add("content", f).then(function(){ closeDrw(); toast("Created <b>" + esc(f.title) + "</b>"); route(); }); }
    }
    var s = $("#cSave"); if (s) s.addEventListener("click", function(){ persist({}, "Saved"); });
    var r = $("#cRev"); if (r) r.addEventListener("click", function(){ persist({ status:"review" }, "Sent to review"); });
    var p = $("#cPub"); if (p) p.addEventListener("click", function(){ persist({ status:"published" }, "Published"); });
    var b = $("#cBack"); if (b) b.addEventListener("click", function(){ persist({ status:"draft" }, "Sent back to draft"); });
    var u = $("#cUnpub"); if (u) u.addEventListener("click", function(){ persist({ status:"draft" }, "Unpublished"); });
  });
}

/* ---------------- adoption ---------------- */
VIEWS.adoption = function(){
  return Promise.all([DB.list("adoptions"), DB.list("adoptapps")]).then(function(r){
    var ds = r[0], apps = r[1];
    var open = apps.filter(function(a){ return ["new","screening","home_visit"].indexOf(a.status) > -1; });
    return '<div class="kpis">' +
      kpi("Looking for a home", ds.filter(function(d){ return d.status === "available"; }).length, "live on the adopt page") +
      kpi("Open applications", open.length, "in screening or home visit") +
      kpi("Reserved", ds.filter(function(d){ return d.status === "reserved"; }).length, "application in progress") +
      kpi("Adopted", ds.filter(function(d){ return d.status === "adopted"; }).length, "home found", true) +
    "</div>" +
    '<div class="card" style="margin-bottom:20px;"><div class="card-h"><h3>Applications</h3></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>App</th><th>Applicant</th><th>For</th><th>Home</th><th>Status</th><th class="num">Sent</th><th></th></tr></thead><tbody>' +
    (apps.length ? apps.map(function(a){
      var act = "";
      if (can("adoption.write")) {
        if (a.status === "new") act = '<button class="btn sm" data-ast="' + a.id + ':screening">Start screening</button>';
        else if (a.status === "screening") act = '<button class="btn sm" data-ast="' + a.id + ':home_visit">Book home visit</button>';
        else if (a.status === "home_visit") act = '<button class="btn sm" data-aok="' + a.id + '">Approve</button>';
        if (["new","screening","home_visit"].indexOf(a.status) > -1) act += ' <button class="btn ghost sm" data-ano="' + a.id + '">Reject</button>';
      }
      return "<tr><td><b>" + a.id + "</b></td><td>" + esc(a.applicant) + '<div class="sub">' + esc(a.city) + " - " + esc(a.household) + "</div></td>" +
        "<td><b>" + esc(a.dog) + '</b></td><td class="sub" style="max-width:220px;">' + esc(a.home) + '<div class="sub">' + esc(a.care) + "</div></td>" +
        "<td>" + badge(a.status) + '</td><td class="num sub">' + when(a.at) + '</td><td class="num" style="white-space:nowrap;">' + act + "</td></tr>";
    }).join("") : '<tr><td colspan="7"><div class="empty">No applications</div></td></tr>') + "</tbody></table></div></div>" +
    '<div class="card"><div class="card-h"><h3>Dogs</h3></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Name</th><th>Sex / age / size</th><th>Place</th><th>Health</th><th>Status</th><th class="num">Updated</th><th></th></tr></thead><tbody>' +
    ds.map(function(d){
      return "<tr><td><b>" + esc(d.name) + "</b></td><td>" + esc(d.sex) + " - " + esc(d.age) + " - " + esc(d.size) + "</td><td>" + esc(d.place) + "</td>" +
        '<td class="sub">' + esc(d.vax) + "<br>" + esc(d.ster) + "</td><td>" + badge(d.status) + '</td><td class="num sub">' + when(d.updated) + '</td><td class="num">' +
        (can("adoption.write") ? '<select class="in" data-ad="' + d.id + '" style="width:auto;padding:6px 8px;font-size:12px;">' +
          ["available","reserved","adopted"].map(function(x){ return '<option value="' + x + '"' + (d.status === x ? " selected" : "") + ">" + ST[x][1] + "</option>"; }).join("") + "</select>"
        : '<span class="tag">Read only</span>') + "</td></tr>";
    }).join("") + "</tbody></table></div></div>";
  });
};
WIRE.adoption = function(){
  $$("[data-ad]").forEach(function(sel){ sel.addEventListener("change", function(){
    DB.put("adoptions", sel.dataset.ad, { status:sel.value, updated:new Date().toISOString() }, "status -> " + sel.value)
      .then(function(){ toast("Updated"); route(); });
  }); });
  $$("[data-ast]").forEach(function(b){ b.addEventListener("click", function(){
    var p = b.dataset.ast.split(":");
    DB.put("adoptapps", p[0], { status:p[1] }, "app -> " + p[1]).then(function(){ toast("Updated"); route(); });
  }); });
  $$("[data-aok]").forEach(function(b){ b.addEventListener("click", function(){
    DB.get("adoptapps", b.dataset.aok).then(function(a){
      if (!confirm("Approve " + a.applicant + " for " + a.dog + "? The dog will be marked adopted.")) return;
      Promise.all([
        DB.put("adoptapps", a.id, { status:"approved" }, "approved for " + a.dog),
        DB.put("adoptions", a.dogId, { status:"adopted", updated:new Date().toISOString() }, "adopted via " + a.id)
      ]).then(function(){ toast("<b>" + esc(a.dog) + "</b> is going home with " + esc(a.applicant)); route(); });
    });
  }); });
  $$("[data-ano]").forEach(function(b){ b.addEventListener("click", function(){
    if (!confirm("Reject this application?")) return;
    DB.put("adoptapps", b.dataset.ano, { status:"rejected" }, "rejected").then(function(){ toast("Rejected"); route(); });
  }); });
};

/* ---------------- team ---------------- */
VIEWS.team = function(){
  return DB.list("team").then(function(us){

/* ---------------- pfa x ---------------- */
VIEWS.pfax = function(){
  return DB.list("xplaces").then(function(xs){
    return '<div class="kpis">' +
      kpi("Certified", xs.filter(function(x){ return x.status === "certified"; }).length, "live on the PFA X page") +
      kpi("In the pipeline", xs.filter(function(x){ return ["applied","assessment"].indexOf(x.status) > -1; }).length, "applied or under assessment") +
      kpi("Lapsed", xs.filter(function(x){ return x.status === "lapsed"; }).length, "renewal overdue") +
    "</div>" +
    '<div class="card"><div class="card-h"><h3>Certifications</h3></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Place</th><th>Category</th><th>Tier</th><th>Status</th><th class="num">Renews</th><th></th></tr></thead><tbody>' +
    xs.map(function(x){
      var act = "";
      if (can("places.write")) {
        if (x.status === "applied") act = '<button class="btn sm" data-xas="' + x.id + '">Start assessment</button>';
        else if (x.status === "assessment") act = '<button class="btn sm" data-xcf="' + x.id + '">Certify</button>';
        else if (x.status === "lapsed") act = '<button class="btn ghost sm" data-xrn="' + x.id + '">Renew</button>';
        else if (x.status === "certified") act = '<select class="in" data-xtier="' + x.id + '" style="width:auto;padding:6px 8px;font-size:12px;">' +
          ["certified","gold","platinum"].map(function(t){ return '<option value="' + t + '"' + (x.tier === t ? " selected" : "") + ">" + t + "</option>"; }).join("") + "</select>";
      }
      return "<tr><td><b>" + esc(x.name) + "</b></td><td>" + esc(x.cat) + "</td><td>" + esc(x.tier) + "</td><td>" + badge(x.status) + "</td>" +
        '<td class="num sub">' + (x.renews ? when(x.renews) : "-") + '</td><td class="num">' + act + "</td></tr>";
    }).join("") + "</tbody></table></div></div>";
  });
};
WIRE.pfax = function(){

    '<div class="card"><div class="card-h"><h3>Directory, nominations and concerns</h3></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Service</th><th>Kind</th><th>City</th><th>Status</th><th class="num">Vetted</th><th></th></tr></thead><tbody>' +
    ss.map(function(x){
      var act = "";
      if (can("places.write")) {
        if (x.status === "nominated") act = '<button class="btn sm" data-svet="' + x.id + '">Vet and list</button> <button class="btn ghost sm" data-sdrop="' + x.id + '">Decline</button>';
        else if (x.status === "concern") act = '<button class="btn sm" data-sok="' + x.id + '">Resolve, keep listed</button> <button class="btn danger sm" data-sdrop="' + x.id + '">Delist</button>';
        else if (x.status === "listed") act = '<button class="btn ghost sm" data-sflag="' + x.id + '">Flag concern</button>';
      }
      return "<tr><td><b>" + esc(x.name) + "</b>" + (x.note ? '<div class="sub">' + esc(x.note) + "</div>" : "") + "</td>" +
        '<td><span class="tag">' + esc(x.kind) + "</span></td><td>" + esc(x.city) + "</td><td>" + badge(x.status) + "</td>" +
        '<td class="num sub">' + (x.vetted ? when(x.vetted) : "-") + '</td><td class="num">' + act + "</td></tr>";
    }).join("") + "</tbody></table></div></div>";
  });
};
WIRE.services = function(){
  function set(id, patch, msg){ DB.put("services", id, patch, msg).then(function(){ toast(msg); route(); }); }
  $$("[data-svet]").forEach(function(b){ b.addEventListener("click", function(){ set(b.dataset.svet, { status:"listed", vetted:new Date().toISOString() }, "Vetted and listed"); }); });
  $$("[data-sok]").forEach(function(b){ b.addEventListener("click", function(){ set(b.dataset.sok, { status:"listed", note:"" }, "Concern resolved"); }); });
  $$("[data-sflag]").forEach(function(b){ b.addEventListener("click", function(){
    var why = prompt("What is the concern?"); if (why === null) return;
    set(b.dataset.sflag, { status:"concern", note:why.trim() }, "Concern flagged");
  }); });
  $$("[data-sdrop]").forEach(function(b){ b.addEventListener("click", function(){

  }); });
};

/* ---------------- heat map ---------------- */
VIEWS.heat = function(){
  return DB.list("heat").then(function(hs){
    var rw = can("heat.write") || actor.role === "admin";
    return '<div class="banner"><svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.3 3.9L2.4 17.5A2 2 0 0 0 4.1 20.5h15.8a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg><span>These values feed the public heat map and are <b>marked illustrative on the site</b> pending the integrity engine. The overall index recomputes as the average of the five signals when you save.</span></div>' +
    '<div class="card"><div class="card-h"><h3>State signals</h3></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>State</th><th class="num">Index</th><th class="num">ABC</th><th class="num">Cruelty</th><th class="num">Feeders</th><th class="num">Municipal</th><th class="num">Rescue</th><th></th></tr></thead><tbody>' +
    hs.map(function(h){
      return "<tr><td><b>" + esc(h.id) + '</b></td><td class="num"><b>' + h.index + "</b></td>" +
        ["abc","cruelty","feeders","municipal","rescue"].map(function(k){
          return '<td class="num">' + (rw ? '<input class="in" data-hs="' + h.id + ':' + k + '" type="number" min="0" max="100" value="' + h[k] + '" style="width:64px;padding:6px 8px;text-align:right;">' : h[k]) + "</td>";
        }).join("") +
        '<td class="num">' + (rw ? '<button class="btn sm" data-hsave="' + h.id + '">Save</button>' : "") + "</td></tr>";
    }).join("") + "</tbody></table></div></div>";
  });
};
WIRE.heat = function(){
  $$("[data-hsave]").forEach(function(b){ b.addEventListener("click", function(){
    var id = b.dataset.hsave, patch = {}, keys = ["abc","cruelty","feeders","municipal","rescue"];
    var bad = false;
    keys.forEach(function(k){
      var v = +$('[data-hs="' + id + ':' + k + '"]').value;
      if (isNaN(v) || v < 0 || v > 100) bad = true;
      patch[k] = Math.round(v);
    });
    if (bad) return toast("Signals must be 0 to 100");
    patch.index = Math.round(keys.reduce(function(a, k){ return a + patch[k]; }, 0) / keys.length);
    DB.put("heat", id, patch, "signals updated, index -> " + patch.index).then(function(){ toast("<b>" + esc(id) + "</b> saved, index " + patch.index); route(); });
  }); });
};

  actor.email = who.email;

});
